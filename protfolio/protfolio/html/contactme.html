<!DOCTYPE html>
<html>

<head>
    <title>Contactme</title>
</head>

<body>
    <form method="post">

        <fieldset>
            <legend>Contact Me</legend>

        <table>

            <tr>
                <td><label for="firstname">First Name:</label></td>
                <td><input type="text" id="firstname" name="firstname" required></td>
            </tr>

            <tr>
                <td><label for="lastname">Last Name:</label></td>
                <td><input type="text" id="lastname" name="lastname" required></td>
            </tr>

            <tr>
                <td><label>Gender</label></td>
                <td>
                    <input type="radio" name="gender" value="male">Male
                    <input type="radio" name="gender" value="female">Female
                </td>
            </tr>

            <td>
                <td><label for="email">Email:</label></td>
                <td><input type="email" id="email" name="email" required></td>
            </td>

        </table>
        </fieldset>

        <fieldset>

            <table>
                
            <tr>
                <td><label>Services:</label></td>
                <td>
                    <input type="checkbox" value="webdevelopment">Web Development
                    <input type="checkbox" value="ai/ml">AI/ML
                    <input type="checkbox" value="backend">Backend
                </td>

            </tr>
            
            </table>
        </fieldset>

        <fieldset>

            <table>
                <tr>
                    <td><label for="reasonofcontact">Reason of Contact:</label></td>
                    <td>
                        <select id="reasonofcontact" name="reasonodcontact">
                            <option>Job</option>
                           <option>Projects</option>
                           <option>Thesis</option>
                        </select>
                           
                    </td>
                </tr>
            </table>
        </fieldset>

        <fieldset>
            <legend>Book Slot:</legend>
            <table>
                <tr>
                    <td><label for="date">Date</label></td>
                    <td><input type="date" id="date" name="date" required></td>
                </tr>
            </table>
        </fieldset>

        <input type="submit" value="submit">
        <input type="reset"  value="reset">
        
        
    </form>
</body>

</html>
